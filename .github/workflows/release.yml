name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            artifact: docx
          - os: macos-latest
            rid: osx-arm64
            artifact: docx
          - os: windows-latest
            rid: win-x64
            artifact: docx.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish src/DocxCli -r ${{ matrix.rid }} -c Release -p:PublishAot=true -p:StripSymbols=true

      - name: Package (Unix)
        if: matrix.rid != 'win-x64'
        run: |
          mkdir staging
          cp src/DocxCli/bin/Release/net10.0/${{ matrix.rid }}/publish/${{ matrix.artifact }} staging/
          cd staging && tar czf ../docx-${{ matrix.rid }}.tar.gz ${{ matrix.artifact }}

      - name: Package (Windows)
        if: matrix.rid == 'win-x64'
        shell: bash
        run: |
          mkdir staging
          cp src/DocxCli/bin/Release/net10.0/${{ matrix.rid }}/publish/${{ matrix.artifact }} staging/
          cd staging && 7z a ../docx-${{ matrix.rid }}.zip ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docx-${{ matrix.rid }}
          path: docx-${{ matrix.rid }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
